<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VIKTOR · WF Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F1;
    --card: #FFFFFF;
    --ink: #1A2B33;
    --ink-soft: #5C6B72;
    --ink-faint: #97A1A6;
    --wf: #1A4F76;
    --wf-2: #5B8AA6;
    --wf-wash: #EAF1F6;
    --line: #E4E0D8;
    --line-soft: #EFEBE3;
    --emo: #B5551F;
    --emo-wash: #FBEFE6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    max-width: 100%;
  }
  .wrap { max-width: 1160px; margin: 0 auto; padding: 0 26px; width: 100%; }

  /* ---------- header (compacto) ---------- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(247,245,241,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .head-inner { padding: 18px 0 16px; }
  .toprow { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .brand-left { display: flex; align-items: center; gap: 9px; justify-self: start; min-width: 0; }
  .brand-center { justify-self: center; text-align: center; min-width: 0; }
  .brand-right { justify-self: end; text-align: right; min-width: 0; }
  .brand-left .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--wf); flex: 0 0 auto; }
  .brand-left .name { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink); font-weight: 600; white-space: nowrap; transition: color 0.14s; }
  a.brand-left { text-decoration: none; cursor: pointer; }
  a.brand-left:hover .name { color: var(--wf); }
  .wf-link { color: inherit; text-decoration: none; transition: color 0.14s; }
  .wf-link:hover { color: var(--wf); text-decoration: underline; }
  .brand-center .title { font-family: 'Fraunces', Georgia, serif; font-size: 19px; color: var(--ink); font-weight: 500; white-space: nowrap; letter-spacing: 0.03em; }
  .brand-right .owner { font-size: 13px; color: var(--ink-faint); letter-spacing: 0.02em; white-space: nowrap; }
  .stat { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.03em; margin-top: 8px; text-align: center; }
  .stat b { color: var(--wf); font-weight: 600; }

  /* ---------- search ---------- */
  .searchbox { margin-top: 12px; position: relative; }
  .searchbox svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; stroke: var(--ink-faint); }
  #q {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 11px;
    color: var(--ink);
    font-family: inherit;
    font-size: 16px;
    padding: 12px 16px 12px 44px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #q:focus { border-color: var(--wf-2); box-shadow: 0 0 0 4px var(--wf-wash); }
  #q::placeholder { color: var(--ink-faint); }

  .controls { margin-top: 11px; display: flex; flex-wrap: wrap; align-items: center; gap: 16px 26px; }
  .cluster { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .cluster .lbl { font-size: 10.5px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--ink-faint); margin-right: 2px; }

  .qsel {
    background: var(--card); border: 1px solid var(--line);
    color: var(--ink-soft); font-family: inherit; font-size: 12.5px;
    padding: 5px 12px; border-radius: 20px; cursor: pointer;
    transition: all 0.14s; max-width: 168px;
  }
  .qsel:hover { border-color: var(--wf-2); color: var(--wf); }
  .qsel:focus { outline: none; border-color: var(--wf-2); box-shadow: 0 0 0 3px var(--wf-wash); }

  .film {
    font-size: 12.5px; padding: 5px 12px; border: 1px solid var(--line);
    border-radius: 7px; color: var(--ink-soft); cursor: pointer; background: transparent;
    font-family: inherit; transition: all 0.14s;
  }
  .film:hover { border-color: var(--wf-2); color: var(--wf); }
  .film.on { background: var(--wf); color: #fff; border-color: var(--wf); }
  .film.disabled { opacity: 0.45; cursor: not-allowed; }
  .film.disabled:hover { border-color: var(--line); color: var(--ink-soft); }

  /* ---------- results grid ---------- */
  main { padding: 24px 0 90px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
    text-decoration: none; color: inherit;
    transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px -12px rgba(26,79,118,0.28); border-color: var(--wf-2); }

  .thumb { position: relative; aspect-ratio: 16/9; background: var(--wf-wash); overflow: hidden; }
  .thumb img { position: relative; z-index: 1; width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .fallback {
    position: absolute; inset: 0; z-index: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 22px; color: var(--wf-2); letter-spacing: 0.04em;
  }
  .thumb .ts {
    position: absolute; left: 10px; bottom: 10px;
    background: rgba(26,43,51,0.82); color: #fff;
    font-size: 12px; font-weight: 500; letter-spacing: 0.03em;
    padding: 3px 9px; border-radius: 6px;
    backdrop-filter: blur(4px);
  }
  .thumb .play {
    position: absolute; right: 10px; bottom: 10px;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.8); transition: all 0.16s;
  }
  .card:hover .play { opacity: 1; transform: scale(1); }
  .play svg { width: 12px; height: 12px; fill: var(--wf); margin-left: 2px; }

  .cbody { padding: 13px 15px 15px; display: flex; flex-direction: column; gap: 9px; flex: 1; }
  .crow { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .code { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; }
  .marca { font-size: 12.5px; color: var(--wf); font-weight: 600; letter-spacing: 0.02em; }
  .meta-com { display: flex; flex-direction: column; gap: 1px; margin-top: -2px; }
  .meta-com .titulo { font-family: 'Fraunces', Georgia, serif; font-size: 15px; color: var(--ink); font-weight: 500; line-height: 1.25; }
  .meta-com .credits { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.02em; }

  .emo { display: inline-block; align-self: flex-start; background: var(--emo-wash); color: var(--emo);
         font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }

  .facts { display: flex; flex-direction: column; gap: 5px; margin-top: 2px; }
  .fact { display: flex; gap: 8px; font-size: 12.5px; line-height: 1.4; }
  .fact .k { color: var(--ink-faint); flex: 0 0 58px; text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; padding-top: 2px; }
  .fact .v { color: var(--ink); flex: 1; }
  .fact .v mark { background: #FCEFA8; color: var(--ink); padding: 0 2px; border-radius: 2px; }

  .golink { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--line-soft);
            display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--wf); font-weight: 500;
            text-decoration: none; }
  .golink svg { width: 13px; height: 13px; stroke: var(--wf); }

  /* ---------- like (corazón sobre el thumb) ---------- */
  .like {
    position: absolute; left: 10px; top: 10px; z-index: 3;
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.86); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: transform 0.14s, background 0.14s; padding: 0;
  }
  .like:hover { transform: scale(1.12); background: #fff; }
  .like svg { width: 17px; height: 17px; fill: none; stroke: var(--emo); stroke-width: 2; transition: fill 0.14s; }
  .like.on svg { fill: var(--emo); stroke: var(--emo); }

  /* ---------- relevancia de búsqueda (pulgares sobre el thumb) ---------- */
  .relbtns { position: absolute; right: 10px; top: 10px; z-index: 3; display: flex; gap: 6px; }
  .relbtn {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.86); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: transform 0.14s, background 0.14s; padding: 0;
  }
  .relbtn:hover { transform: scale(1.12); background: #fff; }
  .relbtn svg { width: 16px; height: 16px; fill: none; stroke: var(--ink-soft); stroke-width: 2; transition: fill 0.14s, stroke 0.14s; }
  .relbtn.up.on svg { fill: var(--wf); stroke: var(--wf); }
  .relbtn.down.on svg { fill: var(--emo); stroke: var(--emo); }

  /* ---------- barra de acciones ---------- */
  .actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line-soft); }
  .act {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
    background: transparent; border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 8px; font-family: inherit; font-size: 11.5px; color: var(--ink-soft);
    cursor: pointer; transition: all 0.14s;
  }
  .act:hover { border-color: var(--wf-2); color: var(--wf); }
  .act.active { border-color: var(--wf-2); color: var(--wf); background: var(--wf-wash); }
  .act svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
  .act .dotmark { width: 6px; height: 6px; border-radius: 50%; background: var(--emo); display: inline-block; }

  /* ---------- panel expandible (tags + nota + corrección) ---------- */
  .panel { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line-soft); flex-direction: column; gap: 12px; }
  .panel.open { display: flex; }
  .panel .sub { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; font-weight: 600; }

  /* todos los tags */
  .alltags { display: flex; flex-direction: column; gap: 4px; }
  .alltags .row { display: flex; gap: 8px; font-size: 12px; line-height: 1.4; align-items: flex-start; }
  .alltags .row .tk { color: var(--ink-faint); flex: 0 0 84px; text-transform: uppercase; font-size: 9.5px; letter-spacing: 0.06em; padding-top: 2px; }
  .alltags .row .tv { color: var(--ink); flex: 1; }
  .tagedit {
    flex: 0 0 auto; background: transparent; border: none; padding: 2px;
    cursor: pointer; color: var(--ink-faint); display: flex; align-items: center;
    opacity: 0.5; transition: opacity 0.14s, color 0.14s;
  }
  .tagedit:hover { opacity: 1; color: var(--wf); }
  .tagedit svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
  .tagedit-input {
    flex: 1; background: var(--bg); border: 1px solid var(--wf-2); border-radius: 6px;
    padding: 3px 7px; font-family: inherit; font-size: 12px; color: var(--ink); outline: none;
  }

  /* nota */
  .note-area textarea {
    width: 100%; min-height: 58px; resize: vertical;
    background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--ink);
    outline: none; transition: border-color 0.14s;
  }
  .note-area textarea:focus { border-color: var(--wf-2); }
  .note-area textarea::placeholder { color: var(--ink-faint); }

  .fixed-badge { font-size: 10px; color: var(--emo); margin-left: 4px; }

  /* botón export en header */
  .export-btn {
    background: transparent; border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 12px; font-family: inherit; font-size: 12px; color: var(--ink-soft);
    cursor: pointer; transition: all 0.14s; white-space: nowrap;
  }
  .export-btn:hover { border-color: var(--wf-2); color: var(--wf); }

  /* filtro solo-favoritos */
  .favtoggle {
    background: transparent; border: 1px solid var(--line); border-radius: 20px;
    padding: 5px 13px; font-family: inherit; font-size: 12.5px; color: var(--ink-soft);
    cursor: pointer; transition: all 0.14s; display: inline-flex; align-items: center; gap: 6px;
  }
  .favtoggle:hover { border-color: var(--emo); color: var(--emo); }
  .favtoggle.on { background: var(--emo-wash); border-color: var(--emo); color: var(--emo); }
  .favtoggle svg { width: 13px; height: 13px; fill: currentColor; stroke: currentColor; stroke-width: 1.5; }

  /* ---------- empty ---------- */
  .empty { text-align: center; padding: 80px 20px; color: var(--ink-soft); grid-column: 1 / -1; }
  .empty .big { font-family: 'Fraunces', serif; font-size: 21px; color: var(--ink); margin-bottom: 8px; }
  .empty .small { font-size: 14px; max-width: 420px; margin: 0 auto; }

  footer { border-top: 1px solid var(--line); padding: 22px 0 44px; }
  footer .f { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.03em; }
  footer .f b { color: var(--ink-soft); font-weight: 600; }

  @media (max-width: 560px){
    .wrap { padding: 0 20px; }
    .grid { grid-template-columns: 1fr; gap: 16px; }
    .fact .k { flex-basis: 52px; }
    /* header en dos renglones: metadatos arriba (extremos), título centrado abajo */
    .toprow { grid-template-columns: 1fr 1fr; grid-template-areas: "left right" "center center"; row-gap: 12px; }
    .brand-left { grid-area: left; }
    .brand-right { grid-area: right; }
    .brand-center { grid-area: center; justify-self: center; }
    .brand-center .title { font-size: 21px; }
    .brand-left .name { font-size: 10px; letter-spacing: 0.18em; }
    .brand-right .owner { font-size: 12px; }
  }

  /* ---------- landing (estilo Google): solo VIKTOR + buscador centrados ---------- */
  body.landing header { position: static; background: transparent; backdrop-filter: none; border-bottom: none; }
  body.landing .head-inner { min-height: 82vh; display: flex; flex-direction: column; justify-content: center; padding: 24px 0; }
  body.landing .brand-left,
  body.landing .stat,
  body.landing .controls,
  body.landing main,
  body.landing footer { display: none; }
  body.landing .toprow { display: block; text-align: center; margin-bottom: 30px; }
  body.landing .brand-center .title { font-size: 62px; letter-spacing: 0.1em; }
  body.landing .searchbox { max-width: 600px; width: 100%; margin: 0 auto; }
  body.landing #q {
    font-size: 18px; padding: 15px 20px 15px 50px; border-radius: 28px;
    box-shadow: 0 4px 16px -8px rgba(26,43,51,0.25);
  }
  body.landing .searchbox svg { left: 20px; width: 19px; height: 19px; }
  /* botón de favoritos y crédito, solo en landing */
  .landing-actions { display: none; }
  body.landing .landing-actions { display: flex; justify-content: center; margin-top: 22px; }
  .landing-fav {
    background: transparent; border: 1px solid var(--line); border-radius: 22px;
    padding: 8px 18px; font-family: inherit; font-size: 13px; color: var(--ink-soft);
    cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.14s;
  }
  .landing-fav:hover { border-color: var(--emo); color: var(--emo); background: var(--emo-wash); }
  .landing-fav svg { width: 14px; height: 14px; fill: currentColor; stroke: currentColor; stroke-width: 1.5; }
  .landing-credit { display: none; }
  body.landing .landing-credit {
    display: block; position: fixed; bottom: 22px; left: 0; right: 0;
    text-align: center; font-size: 12px; color: var(--ink-faint); letter-spacing: 0.04em;
  }
  body.landing .landing-credit b { color: var(--ink-soft); font-weight: 600; }
  @media (max-width: 560px){
    body.landing .brand-center .title { font-size: 42px; }
    body.landing .head-inner { min-height: 74vh; }
  }
</style>
</head>
<body class="landing">
<header>
  <div class="wrap head-inner">
    <div class="toprow">
      <a class="brand-left" href="https://wfstudio.ar/" title="WF Studio">
        <span class="dot"></span>
        <span class="name">WF Studio</span>
      </a>
      <span class="brand-center">
        <span class="title">VIKTOR</span>
      </span>
    </div>

    <div class="searchbox">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="Type the reference you're looking for…" autocomplete="off" autofocus>
    </div>
    <div class="landing-actions">
      <button class="landing-fav" id="landingFav"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.6-9.5-9C1 9 2.5 5 6 5c2 0 3.3 1.2 4 2.3C10.7 6.2 12 5 14 5c3.5 0 5 4 3.5 7-2.5 4.4-9.5 9-9.5 9z"/></svg><span id="landingFavCount">Favorites</span></button>
    </div>
    <div class="stat" id="stat">— shots</div>

    <div class="controls">
      <div class="cluster" id="quickfilters">
        <span class="lbl">Filter</span>
      </div>
      <div class="cluster" style="gap:8px; margin-left:auto;">
        <button class="favtoggle" id="favtoggle"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.6-9.5-9C1 9 2.5 5 6 5c2 0 3.3 1.2 4 2.3C10.7 6.2 12 5 14 5c3.5 0 5 4 3.5 7-2.5 4.4-9.5 9-9.5 9z"/></svg><span id="favcount">Favorites</span></button>
        <button class="export-btn" id="exportbtn">Export my notes</button>
      </div>
    </div>
  </div>
  <div class="landing-credit">Developed by <a class="wf-link" href="https://wfstudio.ar/"><b>WF Studio</b></a> · for Luisa Kracht</div>
</header>

<main>
  <div class="wrap"><div class="grid" id="grid"></div></div>
</main>

<footer>
  <div class="wrap">
    <div class="f"><b><a class="wf-link" href="https://wfstudio.ar/">WF Studio</a> proof of concept.</b> 6 commercials by Dante Ariola (MJZ) indexed with video AI. Each card opens the commercial on the production company's site.</div>
  </div>
</footer>

  /* ---------- datos ---------- */
  const FILMS = BIBLIOTECA.films;
  const P = [];
  FILMS.forEach(f => f.shots.forEach(s => { s._fi = f.film_info; P.push(s); }));

  const filmDe = p => p._fi || {};
  const marcaDe = p => filmDe(p).brand || filmDe(p).client || '';
  const urlDe   = p => filmDe(p).source_url || '';
  const dirDe   = p => filmDe(p).director || '';
  const tituloDe = p => filmDe(p).title || '';

  /* almacenamiento local (v2: los codigos de plano cambiaron con la reindexacion) */
  const STORE_KEY = 'wf_viktor_v2';
  function loadStore(){
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {likes:{}, notes:{}, fixes:{}, relev:{}}; }
    catch(e){ return {likes:{}, notes:{}, fixes:{}, relev:{}}; }
  }
  function saveStore(s){ try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e){} }
  let store = loadStore();
  if(!store.likes) store.likes={}; if(!store.notes) store.notes={}; if(!store.fixes) store.fixes={}; if(!store.relev) store.relev={};

  const isLiked = id => !!store.likes[id];
  const getNote = id => store.notes[id] || '';
  const getFix  = id => store.fixes[id] || null;
  const getRelev = id => store.relev[id] || null;

  function toggleLike(id){
    if(store.likes[id]) delete store.likes[id]; else store.likes[id] = Date.now();
    saveStore(store); updateFavCount();
  }
  function setRelev(id, v){
    const q = document.getElementById('q').value.trim();
    const current = store.relev[id];
    if(current && current.v === v) delete store.relev[id];
    else store.relev[id] = {v, q, t: Date.now()};
    saveStore(store);
  }
  function setNote(id, txt){
    if(txt && txt.trim()) store.notes[id] = txt.trim(); else delete store.notes[id];
    saveStore(store);
  }
  function setFix(id, campo, valor){
    if(valor && valor.trim()) store.fixes[id] = {campo, valor: valor.trim()}; else delete store.fixes[id];
    saveStore(store);
  }
  function updateFavCount(){
    const n = Object.keys(store.likes).length;
    const txt = n ? ('Favorites ('+n+')') : 'Favorites';
    document.getElementById('favcount').textContent = txt;
    document.getElementById('landingFavCount').textContent = txt;
  }

  document.getElementById('stat').innerHTML =
    '<b>' + BIBLIOTECA.total_shots + '</b> shot' + (BIBLIOTECA.total_shots===1?'':'s')
    + ' · <b>' + BIBLIOTECA.total_films + '</b> film' + (BIBLIOTECA.total_films===1?'':'s');

  /* ---------- campos ---------- */
  /* del plano (cambian corte a corte) */
  const campos = ["location","action_activity","characters","emotion","lighting_time_of_day",
                  "palette_colours","palette_feel","production_design","shot_type",
                  "camera_movement","transition"];
  const labels = {location:"Location", action_activity:"Action", characters:"Characters",
                  emotion:"Emotion", lighting_time_of_day:"Light", palette_colours:"Colours",
                  palette_feel:"Palette", production_design:"Design", shot_type:"Shot",
                  camera_movement:"Camera", transition:"Transition",
                  time_period_override:"Period"};
  /* de la pieza (iguales en todos sus planos) */
  const camposFilm = ["film_type","genre","tone","time_period","year","client","brand",
                      "director","production_company"];
  const labelsFilm = {film_type:"Type", genre:"Genre", tone:"Tone", time_period:"Period",
                      year:"Year", client:"Client", brand:"Brand", director:"Director",
                      production_company:"Company"};

  const visibles = [["location","Location"],["lighting_time_of_day","Light"],
                    ["shot_type","Shot"],["action_activity","Action"]];

  /* la IA devuelve strings, arrays o hasta objetos ({age, traits}) segun la corrida;
     aplanamos todo a texto para que se vea y se pueda buscar igual */
  function aTexto(v){
    if(v == null) return '';
    if(Array.isArray(v)) return v.map(aTexto).filter(Boolean).join(', ');
    if(typeof v === 'object') return Object.values(v).map(aTexto).filter(Boolean).join(' — ');
    return String(v);
  }

  /* valor de un campo del plano, respetando correcciones de Luisa */
  function valOf(p, campo){
    const fx = getFix(p._id);
    if(fx && fx.campo === campo) return fx.valor;
    return aTexto(p[campo]);
  }
  /* valor de un campo de la pieza */
  const valFilm = (p, campo) => aTexto(filmDe(p)[campo]);

  const norm = s => (s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  /* la busqueda cubre plano + ficha de la pieza: buscar "Dante Ariola" o "comedy" funciona */
  const textoPlano = p => campos.map(c=>valOf(p,c)).join(' ') + ' ' +
                          camposFilm.map(c=>valFilm(p,c)).join(' ') + ' ' + tituloDe(p);

  function marcar(txt, terms){
    if(!terms.length) return txt;
    let out = txt;
    terms.forEach(t => { if(!t) return;
      const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
      out = out.replace(re,'<mark>$1</mark>'); });
    return out;
  }

  /* ---------- filtros rapidos, generados desde los datos ---------- */
  function topValues(campo, limit, esFilm){
    const freq = new Map();
    P.forEach(p => {
      const raw = esFilm ? valFilm(p, campo) : valOf(p, campo);
      if(!raw) return;
      raw.split(',').forEach(tok => {
        const t = tok.replace(/\([^)]*\)/g,'').trim();
        if(!t || t.length > 40) return;
        const key = norm(t);
        if(!freq.has(key)) freq.set(key, {label: t, count: 0});
        freq.get(key).count++;
      });
    });
    return [...freq.values()].sort((a,b)=> b.count-a.count).slice(0, limit);
  }

  function buildQuickFilters(){
    const box = document.getElementById('quickfilters');
    const fields = [["genre","Genre",true],["tone","Tone",true],
                    ["location","Location",false],["lighting_time_of_day","Lighting",false],
                    ["shot_type","Shot type",false],["camera_movement","Camera",false],
                    ["emotion","Emotion",false],["palette_colours","Colour",false]];
    fields.forEach(([campo, ph, esFilm]) => {
      const opts = topValues(campo, 14, esFilm);
      if(!opts.length) return;
      const sel = document.createElement('select');
      sel.className = 'qsel';
      sel.innerHTML = '<option value="">'+ph+'…</option>' +
        opts.map(o => '<option value="'+o.label.replace(/"/g,'&quot;')+'">'+o.label+'</option>').join('');
      sel.addEventListener('change', () => {
        if(!sel.value) return;
        document.getElementById('q').value = sel.value;
        render();
        document.getElementById('q').focus();
        sel.value = '';
      });
      box.appendChild(sel);
    });
  }

  let soloFavoritos = false;
  let started = false;

  function render(){
    const raw = document.getElementById('q').value.trim();
    if(raw || soloFavoritos) started = true;
    const landing = !started;
    document.body.classList.toggle('landing', landing);
    if(landing){ document.getElementById('grid').innerHTML = ''; return; }

    const terms = norm(raw).split(/\s+/).filter(Boolean);
    const rawTerms = raw.split(/\s+/).filter(Boolean);
    const grid = document.getElementById('grid');

    let items = P.slice();
    if(soloFavoritos) items = items.filter(p => isLiked(p._id));

    if(terms.length){
      let scored = [];
      items.forEach(p => {
        const campoTxt = {};
        campos.forEach(c => campoTxt[c] = norm(valOf(p,c)));
        camposFilm.forEach(c => campoTxt[c] = norm(valFilm(p,c)));
        const hayTotal = norm(textoPlano(p));
        if(!terms.every(t => hayTotal.includes(t))) return;
        const peso = {emotion:3, shot_type:3, camera_movement:3, action_activity:3,
                      lighting_time_of_day:2, location:2, palette_colours:2,
                      production_design:2, characters:2, tone:2, genre:2,
                      palette_feel:1, transition:1, director:1, brand:1, client:1};
        let score = 0;
        terms.forEach(t => {
          Object.keys(campoTxt).forEach(c => { if(campoTxt[c].includes(t)) score += (peso[c]||1); });
        });
        scored.push([score, p]);
      });
      scored.sort((a,b)=> b[0]-a[0]);
      items = scored.map(s=>s[1]);
    } else {
      items = items.slice().sort((a,b)=> a._film.localeCompare(b._film) || a._n-b._n);
    }

    if(items.length===0){
      grid.innerHTML = soloFavoritos
        ? '<div class="empty"><div class="big">You haven’t marked any favorites yet.</div><div class="small">Tap the heart on shots you like and they’ll show up here.</div></div>'
        : '<div class="empty"><div class="big">No shots match “'+raw+'”.</div><div class="small">Try another word: a light, an emotion, a shot type, a colour. The search only covers these '+BIBLIOTECA.total_films+' films.</div></div>';
      return;
    }

    grid.innerHTML = items.map(p => {
      const fi = filmDe(p);
      const marca = marcaDe(p);
      const url = urlDe(p);
      const code = p._film + '·' + String(p._n).padStart(2,'0');
      const thumbUrl = '/viktor/thumbs/' + p._id + '.jpg';
      const liked = isLiked(p._id);
      const hasNote = !!getNote(p._id);
      const hasFix = !!getFix(p._id);
      const rv = getRelev(p._id);

      const facts = visibles.filter(([k])=>valOf(p,k)).map(([k,lbl]) =>
        '<div class="fact"><span class="k">'+lbl+'</span><span class="v">'+marcar(valOf(p,k), rawTerms)+'</span></div>').join('');
      const emoVal = valOf(p,'emotion');
      const emo = emoVal ? '<span class="emo">'+marcar(emoVal.split(',')[0].trim(), rawTerms)+'</span>' : '';
      const anio = fi.year ? ' · ' + fi.year : '';

      const tagsShot = campos.filter(c=>valOf(p,c)).map(c => {
        const fx = getFix(p._id);
        const corregido = fx && fx.campo === c ? ' <span class="fixed-badge">✎ edited</span>' : '';
        return '<div class="row" data-field="'+c+'"><span class="tk">'+labels[c]+'</span><span class="tv">'+valOf(p,c)+corregido+'</span><button class="tagedit" data-editfield="'+c+'" title="Correct this tag"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button></div>';
      }).join('');
      const tagsFilm = camposFilm.filter(c=>valFilm(p,c)).map(c =>
        '<div class="row"><span class="tk">'+labelsFilm[c]+'</span><span class="tv">'+valFilm(p,c)+'</span></div>').join('');

      return '<div class="card" data-id="'+p._id+'">'
        + '<div class="thumb">'
        + '<button class="like '+(liked?'on':'')+'" data-act="like" title="Like as reference">'
        + '<svg viewBox="0 0 24 24"><path d="M12 21s-7-4.6-9.5-9C1 9 2.5 5 6 5c2 0 3.3 1.2 4 2.3C10.7 6.2 12 5 14 5c3.5 0 5 4 3.5 7-2.5 4.4-9.5 9-9.5 9z"/></svg>'
        + '</button>'
        + '<div class="relbtns">'
        + '<button class="relbtn up '+(rv&&rv.v==='up'?'on':'')+'" data-act="relup" title="Relevant to the search"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></button>'
        + '<button class="relbtn down '+(rv&&rv.v==='down'?'on':'')+'" data-act="reldown" title="Not relevant to the search"><svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg></button>'
        + '</div>'
        + '<span class="fallback">'+marca+'</span>'
        + '<img src="'+thumbUrl+'" alt="'+marca+'" loading="lazy" onerror="this.style.display=\'none\'">'
        + '<span class="ts">'+p.timestamp_start+'</span>'
        + '</div>'
        + '<div class="cbody">'
        + '<div class="crow"><span class="code">'+code+'</span><span class="marca">'+marca+'</span></div>'
        + '<div class="meta-com"><span class="titulo">'+tituloDe(p)+'</span><span class="credits">'+dirDe(p)+anio+'</span></div>'
        + emo
        + '<div class="facts">'+facts+'</div>'
        + (url ? '<a class="golink" href="'+url+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M7 17 17 7M9 7h8v8"/></svg>Watch · '+p.timestamp_start+'</a>' : '')
        + '<div class="actions">'
        + '<button class="act '+(hasNote?'active':'')+'" data-act="note"><svg viewBox="0 0 24 24"><path d="M4 4h16v12H8l-4 4z"/></svg> Note</button>'
        + '<button class="act '+(hasFix?'active':'')+'" data-act="tags"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M4 9h16"/></svg> View tags</button>'
        + '</div>'
        + '<div class="panel" data-panel="tags"><div>'
        + '<div class="sub">Shot</div><div class="alltags">'+tagsShot+'</div>'
        + (tagsFilm ? '<div class="sub" style="margin-top:12px">Film</div><div class="alltags">'+tagsFilm+'</div>' : '')
        + '</div></div>'
        + '<div class="panel" data-panel="note"><div class="note-area"><div class="sub">Your note on this reference</div><textarea placeholder="Why does it work for you? What do you like about this shot? (saved in your browser)">'+getNote(p._id)+'</textarea></div></div>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  const grid = document.getElementById('grid');

  function commitTagEdit(card, id, campo, row, input){
    setFix(id, campo, input.value);
    const p = P.find(x=>x._id===id);
    const fx = getFix(id);
    const badge = fx && fx.campo === campo ? ' <span class="fixed-badge">✎ edited</span>' : '';
    const span = document.createElement('span');
    span.className = 'tv';
    span.innerHTML = valOf(p, campo) + badge;
    input.replaceWith(span);
    const editBtn = row.querySelector('[data-editfield]');
    if(editBtn) editBtn.style.display = '';
    const tagsBtn = card.querySelector('[data-act="tags"]');
    if(tagsBtn) tagsBtn.classList.toggle('active', !!getFix(id));
  }

  grid.addEventListener('click', e => {
    const card = e.target.closest('.card'); if(!card) return;
    const id = card.dataset.id;

    const editBtn = e.target.closest('[data-editfield]');
    if(editBtn){
      const campo = editBtn.dataset.editfield;
      const row = editBtn.closest('.row');
      if(row.querySelector('.tagedit-input')) return;
      const p = P.find(x=>x._id===id); if(!p) return;
      const tv = row.querySelector('.tv');
      const current = valOf(p, campo);
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'tagedit-input';
      input.value = current;
      tv.replaceWith(input);
      editBtn.style.display = 'none';
      input.focus();
      input.select();
      input.addEventListener('keydown', ev => {
        if(ev.key === 'Enter'){ input.blur(); }
        if(ev.key === 'Escape'){ input.value = current; input.blur(); }
      });
      input.addEventListener('blur', () => commitTagEdit(card, id, campo, row, input));
      return;
    }

    const actBtn = e.target.closest('[data-act]'); if(!actBtn) return;
    const act = actBtn.dataset.act;
    if(act === 'like'){
      toggleLike(id);
      actBtn.classList.toggle('on', isLiked(id));
      if(soloFavoritos && !isLiked(id)) render();
      return;
    }
    if(act === 'relup' || act === 'reldown'){
      setRelev(id, act === 'relup' ? 'up' : 'down');
      const rv = getRelev(id);
      const upBtn = card.querySelector('.relbtn.up');
      const downBtn = card.querySelector('.relbtn.down');
      if(upBtn) upBtn.classList.toggle('on', !!rv && rv.v === 'up');
      if(downBtn) downBtn.classList.toggle('on', !!rv && rv.v === 'down');
      return;
    }
    const panel = card.querySelector('[data-panel="'+act+'"]'); if(!panel) return;
    const yaAbierto = panel.classList.contains('open');
    card.querySelectorAll('.panel').forEach(pn => pn.classList.remove('open'));
    if(!yaAbierto){ panel.classList.add('open'); }
  });

  let noteTimer;
  grid.addEventListener('input', e => {
    const card = e.target.closest('.card'); if(!card) return;
    const id = card.dataset.id;
    if(e.target.matches('.note-area textarea')){
      clearTimeout(noteTimer);
      const val = e.target.value;
      noteTimer = setTimeout(()=>{
        setNote(id, val);
        const btn = card.querySelector('[data-act="note"]');
        if(btn) btn.classList.toggle('active', !!getNote(id));
      }, 400);
    }
  });

  document.getElementById('q').addEventListener('input', render);

  document.getElementById('favtoggle').addEventListener('click', () => {
    soloFavoritos = !soloFavoritos;
    document.getElementById('favtoggle').classList.toggle('on', soloFavoritos);
    render();
  });

  document.getElementById('landingFav').addEventListener('click', () => {
    soloFavoritos = true;
    document.getElementById('favtoggle').classList.toggle('on', soloFavoritos);
    render();
  });

  document.getElementById('exportbtn').addEventListener('click', () => {
    const likes = Object.keys(store.likes);
    const notes = store.notes;
    const fixes = store.fixes;
    const buscar = id => P.find(x=>x._id===id);
    let out = "REFERENCE FILE — VIKTOR\n";
    out += "Exported: " + new Date().toLocaleString('en-US') + "\n";
    out += "=".repeat(50) + "\n\n";
    out += "SHOTS I LIKE (" + likes.length + ")\n" + "-".repeat(30) + "\n";
    if(!likes.length) out += "(none yet)\n";
    likes.forEach(id => {
      const p = buscar(id); if(!p) return;
      out += "\n• " + id + " — " + marcaDe(p) + " · " + tituloDe(p) + " (" + p.timestamp_start + ")\n";
      out += "  Shot: " + valOf(p,'shot_type') + " | Camera: " + (valOf(p,'camera_movement')||'—') + " | Light: " + valOf(p,'lighting_time_of_day') + "\n";
      out += "  Action: " + valOf(p,'action_activity') + "\n";
      out += "  Emotion: " + valOf(p,'emotion') + "\n";
      out += "  Colours: " + valOf(p,'palette_colours') + "\n";
      if(getNote(id)) out += "  ✎ My note: " + getNote(id) + "\n";
    });
    const notasSueltas = Object.keys(notes).filter(id => !store.likes[id]);
    if(notasSueltas.length){
      out += "\n\nOTHER NOTES (" + notasSueltas.length + ")\n" + "-".repeat(30) + "\n";
      notasSueltas.forEach(id => {
        const p = buscar(id); if(!p) return;
        out += "\n• " + id + " — " + marcaDe(p) + " (" + p.timestamp_start + ")\n  " + notes[id] + "\n";
      });
    }
    const fixIds = Object.keys(fixes);
    if(fixIds.length){
      out += "\n\nTAG CORRECTIONS (" + fixIds.length + ") — system maintenance\n" + "-".repeat(30) + "\n";
      fixIds.forEach(id => {
        out += "• " + id + ": " + (labels[fixes[id].campo]||fixes[id].campo) + " → \"" + fixes[id].valor + "\"\n";
      });
    }
    const relevIds = Object.keys(store.relev);
    if(relevIds.length){
      out += "\n\nSEARCH RELEVANCE (" + relevIds.length + ")\n" + "-".repeat(30) + "\n";
      relevIds.forEach(id => {
        const p = buscar(id); if(!p) return;
        const r = store.relev[id];
        const marker = r.v === 'up' ? "✓ relevant" : "✗ not relevant";
        out += "• " + id + " — " + marcaDe(p) + " (" + p.timestamp_start + "): " + marker + " [searching: \"" + r.q + "\"]\n";
      });
    }
    const blob = new Blob([out], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'viktor-references.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  buildQuickFilters();
  updateFavCount();
  render();
</script>
</body>
</html>
